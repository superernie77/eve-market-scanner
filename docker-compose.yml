services:
  postgres:
    image: postgres:16
    container_name: evemarket-postgres
    environment:
      POSTGRES_DB: evemarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - evemarket-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  evemarket-pgdata:
